<script>
// TODO: 나중에 Spring Boot API에서 fetch로 교체
// fetch('/api/projects').then(r=>r.json()).then(data => { projects = data; init(); });

const projects = [
  { id:1, year:2025, title:'꾸준', desc:'느린 학습자 학습 지원 앱 백엔드',
    tags:['Spring JPA','Spring Security','OAuth','JWT','MySQL'], types:['a','a','b','b','b'],
    detail:'KakaoPay, GooglePlayBilling API 활용 구독 모델 개발. 일일 학습 결과 저장·조회 달력 API 개발.',
    role:'Backend Member (산학 프로젝트)', period:'2025.03 ~ 2025.06', github:'', demo:'' },
  { id:2, year:2024, title:'서버 모니터링 툴', desc:'Nginx 로그 실시간 파싱 대시보드',
    tags:['Python','Flask','Chart.js'], types:['a','a','b'],
    detail:'Nginx 액세스 로그를 실시간으로 파싱해 트래픽 현황을 웹 대시보드로 시각화. 1초 간격 폴링 방식.',
    role:'개인 프로젝트', period:'2024.09 ~ 2024.11', github:'https://github.com', demo:'' },
  { id:3, year:2024, title:'REST API 서버', desc:'Spring Boot 기반 JWT 인증 CRUD API',
    tags:['Java','Spring Boot','MySQL'], types:['a','a','b'],
    detail:'계층형 아키텍처, JUnit 단위 테스트. AWS EC2 + Nginx 리버스 프록시 배포.',
    role:'개인 프로젝트', period:'2024.03 ~ 2024.05', github:'https://github.com', demo:'' },
  { id:4, year:2024, title:'AWS 인프라 구성', desc:'3-tier 아키텍처 IaC 실습',
    tags:['AWS','Terraform','Linux'], types:['g','g',''],
    detail:'EC2, RDS, S3 기반 3-tier 구성. Terraform으로 인프라 코드화, 오토스케일링 그룹 및 ALB 설정.',
    role:'개인 실습', period:'2024.07 ~ 2024.08', github:'', demo:'' },
  { id:5, year:2023, title:'실시간 채팅 앱', desc:'WebSocket 기반 다중 채널 채팅',
    tags:['Node.js','Socket.io','MongoDB'], types:['g','g','b'],
    detail:'룸 기반 채널, 메시지 히스토리 저장. 이미지 전송 기능 포함. Heroku 배포.',
    role:'개인 프로젝트', period:'2023.06 ~ 2023.08', github:'https://github.com', demo:'https://demo.example.com' },
  { id:6, year:2023, title:'학사 정보 크롤러', desc:'공지사항 자동 크롤링 Discord 봇',
    tags:['Python','BeautifulSoup','Discord API'], types:['a','a','p'],
    detail:'매 30분 크롤링, 새 공지 감지 시 Discord 웹훅 알림. 현재도 실 사용 중.',
    role:'개인 프로젝트', period:'2023.03 ~ 현재', github:'https://github.com', demo:'' },
  { id:7, year:2022, title:'CHEG', desc:'반려동물 명품 쇼핑몰 크롤링 서비스',
    tags:['Python','Django','MySQL','Ajax'], types:['a','a','b','b'],
    detail:'반려동물 명품 상품정보 & 링크를 크롤링하여 제공. 멋사 11기 팀 프로젝트. 중앙 해커톤 출품.',
    role:'멋쟁이사자처럼 11기 팀 프로젝트', period:'2022.09 ~ 2022.11', github:'https://github.com', demo:'' },
  { id:8, year:2022, title:'포트폴리오 사이트 v1', desc:'바닐라 JS 개인 포트폴리오',
    tags:['HTML','CSS','JavaScript'], types:['b','','g'],
    detail:'프레임워크 없이 바닐라 JS만으로 구현. 반응형 레이아웃, 다크모드, 스크롤 애니메이션.',
    role:'개인 프로젝트', period:'2022.09 ~ 2022.10', github:'https://github.com', demo:'' },
  { id:9, year:2021, title:'계산기 앱', desc:'키보드 지원 웹 계산기 — 첫 프로젝트',
    tags:['HTML','CSS','JavaScript'], types:['b','','g'],
    detail:'첫 웹 개발 프로젝트. 사칙연산, 키보드 입력, 연산자 우선순위 처리.',
    role:'개인 프로젝트', period:'2021.12', github:'https://github.com', demo:'' },
];

const years = [...new Set(projects.map(p=>p.year))].sort((a,b)=>b-a);
let activeYear = years[0];
let selectedId = null;

document.getElementById('totalCount').textContent = projects.length;

function buildTabs() {
  document.getElementById('yrTabs').innerHTML = years.map(y => {
    const cnt = projects.filter(p=>p.year===y).length;
    return `<div class="yr-tab${y===activeYear?' active':''}" onclick="selectYear(${y})">${y}<span class="yr-count">${cnt}</span></div>`;
  }).join('');
}

function buildCards() {
  const list = projects.filter(p=>p.year===activeYear);
  document.getElementById('cardList').innerHTML = list.map(p => `
    <div class="proj-card${selectedId===p.id?' active':''}" onclick="selectProject(${p.id})">
      <div class="proj-card-title">${p.title}<span class="proj-arrow">→</span></div>
      <div class="proj-desc-short">${p.desc}</div>
      <div class="tag-row">${p.tags.map((t,i)=>`<span class="ptag ${p.types[i]||''}">${t}</span>`).join('')}</div>
    </div>`).join('');
}

function buildDetail(p) {
  if (!p) {
    document.getElementById('detailPanel').innerHTML = `
      <div class="detail-empty">
        <div class="detail-empty-icon">▶</div>
        <div class="detail-empty-text">프로젝트를 선택해봐요</div>
      </div>`;
    return;
  }
  document.getElementById('detailPanel').innerHTML = `
    <div class="detail-yr">$ cat projects/${p.year}/${p.title.replace(/\s/g,'_')}.md</div>
    <div class="detail-title">${p.title}</div>
    <div class="detail-tags">${p.tags.map((t,i)=>`<span class="ptag ${p.types[i]||''}" style="font-size:11px;padding:3px 10px;">${t}</span>`).join('')}</div>
    <div class="dl">기간</div><div class="dv">${p.period}</div>
    <div class="dl">역할</div><div class="dv">${p.role}</div>
    <div class="divider"></div>
    <div class="dl">상세 내용</div>
    <div class="dv">${p.detail}</div>
    <div class="links-row">
      ${p.github ? `<a class="det-link gh" href="${p.github}" target="_blank">GitHub →</a>` : ''}
      ${p.demo   ? `<a class="det-link demo" href="${p.demo}" target="_blank">Demo →</a>` : ''}
    </div>`;
}

function selectYear(y) { activeYear=y; selectedId=null; buildTabs(); buildCards(); buildDetail(null); }
function selectProject(id) { selectedId=id; buildCards(); buildDetail(projects.find(p=>p.id===id)); }

buildTabs(); buildCards(); buildDetail(null);
</script>
</body>
</html>
