<!DOCTYPE html>
<html lang="ko">
<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Pretendard:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="js/main.js" defer></script>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">

      <a href="experience.html" class="nav-link active">experience</a>

<main class="main">
  <div class="breadcrumb">
    <span class="crumb-dir">📁 ~/eunhak</span>
    <span class="crumb-arr"></span>
    <span class="crumb-sub">📄 experience</span>
    <span class="crumb-arr2"></span>
  </div>
  <div class="page-title">$ cat experience.md</div>
  <div class="page-sub">총 5개의 경험 · 4개의 수상</div>

  <div class="sec-label">work</div>
  <div class="exp-grid" id="workGrid"></div>

  <div class="sec-label">activity</div>
  <div class="exp-grid" id="activityGrid"></div>

  <div class="sec-label">awards</div>
  <div class="awards-grid" id="awardsGrid"></div>
</main>

<footer class="footer">© 2026 | eunhak</footer>

<script>
const works = [
  { id:'w1', period:'2025.12 ~ current', title:'주)비틀웍스', sub:'Server & Infra', badge:'work', current:true,
    activities:['Linux(Debian) 서버 관리 작업','3학년 겨울방학 현장실습 후 아르바이트로 전환'],
    stacks:[{t:'Linux',c:'g'},{t:'Debian',c:'g'},{t:'Server',c:'b'}], note:'' },
  { id:'w2', period:'2022.06 ~ 2022.09', title:'DuPont Korea', sub:'Water & Protection / HSS Solution Internship', badge:'work', current:false,
    activities:['방호복 내부 열관리 실험 설계 및 진행, 실험 물자 관리','3D Modeling — 프로토타입 부품 설계 및 프린팅','모델별 실험 결과 저장 및 분석, PPT 제작 및 발표'],
    stacks:[{t:'3D Modeling',c:'gray'},{t:'Data Analysis',c:'gray'}], note:'' },
];

const activities = [
  { id:'a1', period:'2025.03 ~ 2025.06', title:'한국항공대학교 산학 프로젝트', sub:'Backend Member', badge:'project', current:false,
    activities:['꾸준 — 느린 학습자의 학습적·사회적 자립 지원 앱','KakaoPay, GooglePlayBilling API 활용 구독 모델 개발','일일 학습 결과 저장·조회 달력 API 개발'],
    stacks:[{t:'Spring JPA',c:'a'},{t:'Spring Security',c:'a'},{t:'OAuth',c:'b'},{t:'JWT',c:'b'},{t:'MySQL',c:'b'},{t:'H2',c:'gray'}],
    note:'2025 산학프로젝트 1위 수상' },
  { id:'a2', period:'2025.03 ~ 2025.06', title:'한국항공대학교 UMC', sub:'개발 연합동아리 8th Member', badge:'club', current:false,
    activities:['Springboot 팀 스터디장','세션: Git, Java, Springboot, JPA, MySQL, Paging, Swagger'],
    stacks:[{t:'Java',c:'a'},{t:'Spring Boot',c:'a'},{t:'JPA',c:'a'},{t:'MySQL',c:'b'},{t:'Swagger',c:'gray'}], note:'' },
  { id:'a3', period:'2022.03 ~ 2023.06', title:'한국항공대학교 멋쟁이사자처럼', sub:'웹 개발 & IT 창업 동아리 11기 멤버 → 12기 운영진', badge:'club', current:false,
    activities:['11기 — 세션: Git, Python, UX/UI, Crawling, Django','11기 — 반려동물 명품 쇼핑몰 CHEG 개발 (크롤링 기반)','11기 — 멋사 중앙 해커톤 참가 (CHEG), MSW 슈퍼해커톤 참가','12기 운영진 — Java 세션 진행 및 기타 세션 자료 검수','12기 — 세션: Java, Spring Boot, HTML, CSS, UX/UI, AWS'],
    stacks:[{t:'Python',c:'a'},{t:'Django',c:'a'},{t:'MySQL',c:'b'},{t:'Java',c:'a'},{t:'Spring Boot',c:'a'},{t:'AWS',c:'g'}], note:'' },
];

const awards = [
  { title:'산학프로젝트', year:'2025', rank:'1위', icon:'gold' },
  { title:'창업 아이디어 경진대회', year:'2022', rank:'최우수상', icon:'gold' },
  { title:'Adventure Design', year:'2022', rank:'2위', icon:'silver' },
  { title:'Airbus101', year:'2022', rank:'4위', icon:'bronze' },
];

const rankIcon = { gold:'🥇', silver:'🥈', bronze:'🥉' };

function buildExp(data, gridId) {
  document.getElementById(gridId).innerHTML = data.map(e => `
    <div class="exp-card" id="${e.id}" onclick="toggle('${e.id}')">
      <div class="exp-main">
        <span class="exp-period">${e.period}</span>
        <div>
          <div class="exp-title">${e.title}</div>
          <div class="exp-sub">${e.sub}</div>
        </div>
        <div class="exp-badges">
          <span class="ebadge ${e.badge}">${e.badge==='work'?'경력':e.badge==='club'?'동아리':'프로젝트'}</span>
          ${e.current ? '<span class="ebadge current">재직중</span>' : ''}
          <span class="chevron">▶</span>
        </div>
      </div>
      <div class="exp-detail">
        <div class="dl">활동 내용</div>
        <ul class="bullet-list">${e.activities.map(a=>`<li>${a}</li>`).join('')}</ul>
        ${e.stacks.length ? `
        <div class="dl" style="margin-top:10px;">기술 스택</div>
        <div class="tag-row">${e.stacks.map(s=>`<span class="etag ${s.c}">${s.t}</span>`).join('')}</div>` : ''}
        ${e.note ? `<div style="font-family:var(--mono);font-size:11px;color:#854F0B;background:#FAEEDA;border-radius:6px;padding:6px 10px;margin-top:10px;">🏆 ${e.note}</div>` : ''}
      </div>
    </div>`).join('');
}

function buildAwards() {
  document.getElementById('awardsGrid').innerHTML = awards.map(a => `
    <div class="award-card">
      <div class="award-icon ${a.icon}">${rankIcon[a.icon]||'🏅'}</div>
      <div>
        <div class="award-title">${a.title}</div>
        <div class="award-detail">${a.year} · ${a.rank}</div>
      </div>
    </div>`).join('');
}

function toggle(id) { document.getElementById(id).classList.toggle('open'); }

buildExp(works, 'workGrid');
buildExp(activities, 'activityGrid');
buildAwards();
</script>
</body>
</html>
